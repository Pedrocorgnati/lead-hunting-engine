# ============================================
# DOCKER COMPOSE — DESENVOLVIMENTO LOCAL
# Lead Hunting Engine
# Uso: docker compose up
#
# NOTA SOBRE SUPABASE AUTH:
# Este compose sobe um PostgreSQL local para Prisma (schema + queries).
# As funcionalidades de Auth do Supabase (login, JWT, RLS) requerem
# o Supabase local stack separado:
#   npx supabase start
# Para dev completo, use o .env local diretamente sem Docker.
# ============================================

services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  app_node_modules:
  db_data:
